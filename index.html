<html>
  <head>
    <title>Matematyczny kalendarz grudniowy 2024</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
      header {
        background: #e21a1a;
      }
    </style>
  </head>
  <body>
    <header class="py-3">
      <div class="container">
        <h1 class="text-white text-center">Matematyczny kalendarz grudniowy 2024</h1>
      </div>
    </header>
    <main class="py-3">
      <div class="container">
        <div class="row justify-content-center">
          <!-- Zadania -->
          <div class="col-6 col-md-3 pe-0">
            <h4 class="mb-2 pe-3 text-end"><b>Zadania</b></h4>
            <!-- Lista zadań uzupełniania skryptem JS -->
            <ul class="list-group list-unstyled text-end" id="zadania-lista">
              <li><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div></li>
            </ul>
          </div>
          <!-- Odpowiedzi -->
          <div class="col-6 col-md-3 ps-0">
            <h4 class="mb-2 ps-3 text-start text-secondary "><em>Odpowiedzi</em></h4>
            <!-- Lista odpowiedzi uzupełniana skryptem JS -->
            <ul class="list-group list-unstyled text-start" id="odpowiedzi-lista">
              <li><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div></li>
            </ul>
          </div>
        </div>
        <h4 class="text-center pt-3 my-3 border-top">Podziel się tą stroną z kolegą lub koleżanką obok! <br/>Pokaż poniższy kod QR do zeskanowania:</h4>
        <div class="d-flex justify-content-center">
          <div class="col-6 col-md-2">
            <img class="mw-100" src="/kalendarz-grudniowy-2024/kod-qr-do-strony-www.png"/>
          </div>
        </div>
      </div>
    </main>
    <footer class="border-top py-3">
      <p class="text-center text-muted">© 2024 Eliza Świątkowska</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
