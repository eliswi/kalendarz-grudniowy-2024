<html>
  <head>
    <title>Kalendarz grudniowy 2024</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  </head>
  <body>
    <header class="container">
      <h1 class="mb-3 text-center">Kalendarz grudniowy 2024</h1>
    </header>
    <main class="container">
      <div class="row">
        <!-- Zadania -->
        <div class="col-6 border-right">
          <div class="pr-2">
            <h3 class="mb-2 text-end">Zadania</h2>
            <!-- Lista zadań uzupełniania skryptem JS -->
            <ul class="list-unstyled text-end" id="zadania-lista">
            </ul>
          </div>
        </div>
        <!-- Odpowiedzi -->
        <div class="col-6">
          <div class="pl-2">
            <h3 class="mb-2 text-start">Odpowiedzi</h2>
            <!-- Lista odpowiedzi uzupełniana skryptem JS -->
            <ul class="list-unstyled text-start" id="odpowiedzi-lista">
            </ul>
          </div>
        </div>
      </div>
      <h2 class="text-center my-3 border-top">Podziel się tą stroną z kolegą lub koleżanką obok! <wbr/>Podaj poniższy kod QR do zeskanowania!</h2>
      <div class="text-center"><img class="" src="/kalendarz-grudniowy-2024/kod-qr-do-strony-www.png"/></div>
    </main>
    <footer>
      <p class="border-top py-3 my-4 text-center text-muted">© 2021 Company, Inc</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
