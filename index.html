<html>
  <head>
    <title>Kalendarz grudniowy 2024</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
      <h1 class"mb-3 text-center">Kalendarz grudniowy 2024</h1>
      <div class="row">
        <!-- Zadania -->
        <div class="col-6">
          <div class="pr-2">
            <h3 class="mb-2 text-end">Zadania</h2>
            <!-- Lista zadań uzupełniania skryptem JS -->
            <ul class="list-unstyled text-end" id="zadania-lista">
            </ul>
          </div>
        </div>
        <!-- Odpowiedzi -->
        <div class="col-6">
          <div class="pl-2">
            <h3 class="mb-2 text-start">Zadania</h2>
            <!-- Lista odpowiedzi uzupełniana skryptem JS -->
            <ul class="list-unstyled text-start" id="odpowiedzi-lista">
            </ul>
          </div>
        </div>
      </div>
      <h2 class="text-center mb-3">Podziel się tą stroną z kolegą lub koleżanką obok! <wbr/>Podaj poniższy kod QR do zeskanowania!</h2>
      <div class="text-center"><img class="" src=/kalendarz-grudniowy-2024/kod-qr-do-strony-www.png"/></div>
    </div>
    <script>
      var zadaniaListaStr = "";
      var odpowiedziListaStr = "";
      var dataDzisiejsza = new Date();

      // TODO: zamien finalnie na grudniowe daty !!!
      for (var listopad = new Date(2024, 10, 1); d <= dataDzisiejsza; listopad.setDate(listopad.getDate() + 1)) {
          var nazwaPlikuZadania = zadania_" + (listopad.getDate < 10 ? "0" : "") + listopad.getDate() + "_listopada_2024.pdf";
          zadaniaListaStr += '<li><a href="/kalendarz-grudniowy-2024/' + nazwaPlikuZadania + '" class="" target="_blank">Zadania ' + (listopad.getDate < 10 ? "0" : "") + listopad.getDate() + " listopada 2024"</a></li>";

          var nazwaPlikuOdpowiedzi = odpowiedzi_" + (listopad.getDate < 10 ? "0" : "") + listopad.getDate() + "_listopada_2024.pdf";
          odpowiedziListaStr += '<li><a href="/kalendarz-grudniowy-2024/' + nazwaPlikuOdpowiedzi + '" class="" target="_blank">Odpowiedzi ' + (listopad.getDate < 10 ? "0" : "") + listopad.getDate() + " listopada 2024"</a></li>";
      }
      
      var zadaniaObj = document.getElementById("zadania-lista");
      var odpowiedziObj = document.getElementById("odpowiedzi-lista");

      zadaniaObj.innerHTML = zadaniaListaStr;
      odpowiedziObj.innerHTML = odpowiedziListaStr;
    </script>
  </body>
</html>
